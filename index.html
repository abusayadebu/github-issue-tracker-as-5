<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Github Issue Tracker</title>
    <!-- css file connect -->
     <link rel="stylesheet" href="./tailwind.init.css">
    <!-- tailwind and daisyUi cdn -->
     <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- font family link -->
     <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

</head>
<body class="font-geist">
    <!-- header -->
     <header>

     </header>

     <!-- main -->
    <main>
        <Section class="h-[100vh] flex flex-col justify-center items-center">
            <div class="card bg-base-100 w-full max-w-sm shrink-0 shadow-xl mx-auto ">
                <img class="max-w-[100px] mx-auto my-6" src="./assets/github-logo.png" alt="">
                <h2 class="font-bold text-2xl text-[#1F2937] text-center">GitHub Issues Tracker</h2>
                <p class="text-[#64748B] text-center">Sign in to manage your issues</p>
      <div class="card-body">
        <fieldset class="fieldset">
          <label class="label text-[#1F2937] text-lg">Username</label>
          <input id="userName" type="email" class="input" placeholder="Enter Username" />
          <label class="label text-[#1F2937] text-lg">Password</label>
          <input id="passWord" type="password" class="input" placeholder="Enter Password" />

          <button id="signInBtn" class="btn btn-primary mt-4">Sign In</button>
        </fieldset>
      </div>
        </Section>
    </main>

    <!-- footer -->
     <footer>

     </footer>

     <!-- script file -->
      <script src="./js/script.js"></script>
</body>
</html>
