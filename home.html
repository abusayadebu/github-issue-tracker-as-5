<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Github Issue Tracker</title>
    <!-- css file connect -->
     <link rel="stylesheet" href="./tailwind.init.css">
    <!-- tailwind and daisyUi cdn -->
     <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- font family link -->
     <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
    <!-- font awesome cdn -->
     <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

</head>
<body class="font-geist">
    <!-- header -->
     <header class="container mx-auto">
            <nav class="navbar bg-base-100 shadow-sm">
  <div class="flex-1 md:flex gap-3 items-center">
    <img class="w-[50px]" src="./assets/github-logo.png" alt="">
    <h2 class="text-xl md:text-2xl font-bold">GitHub Issues Tracker</h2>
  </div>

  <div class="md:flex items-center gap-3">
  <!-- Search Input -->
  <div class="relative">
    <i class="fa-solid fa-search absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"></i>
    <input id="searchInput" type="text" placeholder="Search issues..." class="font-semibold border border-gray-300 rounded-lg pl-10 pr-4 py-2 w-64 focus:outline-none focus:ring-1 focus:ring-black">
  </div>
  <button class="mt-2 md:mt-0 btn btn-primary text-lg"><i class="fa-solid fa-plus"></i> New Issue</button>
</div>

</nav>
     </header>

     <!-- main -->
    <main class="container w-11/12 mx-auto">
        <!-- button section -->
         <section class="shadow-sm rounded-xl my-12 p-6 flex gap-8">
            <button id="allFilterBtn" class="btn btn-primary px-8 border-gray-400">All</button>
            <button id="openFilterBtn" class="btn border-gray-400 px-8">Open</button>
            <button id="closedFilterBtn" class="btn px-8 border-gray-400">Closed</button>
         </section>

         <!-- issues section -->
          <section class="shadow-md rounded-xl my-12 p-6 md:flex items-center justify-between">
            <div class="flex gap-2 items-center">
                <div class="w-[50px] h-[50px] rounded-full bg-purple-200 flex justify-center items-center">
                <img src="./assets/Aperture.png" alt="">
            </div>

            <div>
                <h3 id="totalIssuesCount" class="font-bold text-xl">50 <span>Issues</span></h3>
                <p class="text-[#64748B]">Track and manage your project issues</p>
            </div>
            </div>

            <!-- status color -->
             <div class="flex gap-5 items-center mt-5 md:mt-0">
                <div class="flex gap-2 items-center">
                <div class="w-[15px] h-[15px] rounded-full bg-green-400"></div>
                <span class="text-lg font-semibold">Open</span>
             </div>
             <div class="flex gap-2 items-center">
                <div class="w-[15px] h-[15px] rounded-full bg-purple-400"></div>
                <span class="text-lg font-semibold">Closed</span>
             </div>
             </div>

          </section>

          <!-- issues card container section -->
           <section>
            <section id="issueCardContainer" class="shadow-sm rounded-xl p-6 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-8">
           </section>
           <div id="loader" class="hidden hadow-sm rounded-xl p-6 h-[200px] text-center py-10">
            <span class="loading loading-bars loading-xl"></span>
          </div>
           </section>

           <!-- issue details modal -->

              <!-- Open the modal using ID.showModal() method -->
<button class="btn hidden" onclick="issueDetailsModal.showModal()">open modal</button>
<dialog id="issueDetailsModal" class="modal">
  <div class="modal-box">
    <h3 id="modalTitle" class="font-bold text-2xl mb-2"></h3>
    <span id="modalStatus" class="bg-green-500 text-white px-2 font-medium rounded-lg"></span>
    <!-- labels -->
    <div id="modalLabels" class="flex flex-wrap gap-2 mt-4"></div>

    <p id="modalDescription" class="py-4 text-[#64748B] text-lg"></p>
     <div class="flex items-center gap-4 text-sm text-gray-500">
      <p id="modalAuthor" class=""></p>
      <p id="modalDate"></p>
    </div>

    <div class="modal-action">
      <form method="dialog">
        <!-- if there is a button in form, it will close the modal -->
        <button class="btn btn-primary">Close</button>
      </form>
    </div>
  </div>
</dialog>
          
    </main>


    
    <!-- footer -->
     <footer>

     </footer>

     <!-- script file -->
     <script src="./js/home.js"></script>
</body>
</html>
